name: 🤖 Notion → AI → Pull Request

on:
  # ── تلقائي: كل يوم الساعة 9 الصبح (بتوقيت UTC = 11 بتوقيت القاهرة)
  schedule:
    - cron: "0 7 * * *"

  # ── يدوي: تقدر تشغله من GitHub Actions tab في أي وقت
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't create PR, just log)"
        required: false
        default: false
        type: boolean

jobs:
  generate-pr:
    name: Generate Code & Open PR
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write      # عشان نعمل branch و commit
      pull-requests: write # عشان نفتح PR

    steps:
      # ── 1. Checkout الـ Repo ──────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──────────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # cache: "npm"

      # ── 3. تثبيت الـ Dependencies ─────────────────────────
      - name: 📦 Install Dependencies
        run: |
          cd scripts
          npm install

      # ── 4. تشغيل الـ Script ───────────────────────────────
      - name: 🚀 Run Notion → PR Automation
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY : ${{ secrets.GROQ_API_KEY  }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}    # تلقائي - مش محتاج تضيفه
          # REPO_OWNER: ${{ github.repository_owner }}   # تلقائي
          # REPO_NAME: ${{ github.event.repository.name }} # تلقائي
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}    # تلقائي - مش محتاج تضيفه
          REPO_OWNER: "Peter-Eshak-Abdo"   # تلقائي
          REPO_NAME: "abona-faltaus" # تلقائي
        run: node scripts/notion-to-pr.js

      # ── 5. لو حصل Error، ابعت Summary ────────────────────
      - name: 📊 Job Summary
        if: always()
        run: |
          echo "## 🤖 Notion → PR Automation" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
