name: Telegram Notion Bot

on:
  schedule:
    - cron: "0 7 * * 1-5" # الاثنين للجمعة فقط
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't create PR, just log)"
        required: false
        default: false
        type: boolean

jobs:
  generate-pr:
    name: Generate Code & Open PR
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write # عشان نعمل branch و commit
      pull-requests: write # عشان نفتح PR

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🧪 Run Tests
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/test.js
